minimum_pre_commit_version: "4.0.0"
default_install_hook_types: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: make-lint
        name: make lint (10/10 quality gate)
        entry: make lint
        language: system
        pass_filenames: false
        always_run: true
      - id: make-test
        name: make test (100% success gate)
        entry: make test
        language: system
        pass_filenames: false
        always_run: true
