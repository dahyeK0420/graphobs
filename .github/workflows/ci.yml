name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --python ${{ matrix.python-version }} --all-groups
      - run: uv run --python ${{ matrix.python-version }} pytest

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv python install 3.14
      - run: uv sync --python 3.14 --all-groups
      - run: uv run --python 3.14 ruff check .
      - run: uv run --python 3.14 ruff format --check .
      - run: uv run --python 3.14 mypy .
      - run: uv run --python 3.14 mkdocs build --strict
      - run: uv build
